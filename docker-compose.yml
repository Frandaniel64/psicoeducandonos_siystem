version: '3.8'

services:
  # Base de Datos PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: psicoeducandonos_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: psicoeducandonos_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Backend: NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: psicoeducandonos_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - db
    # Usamos esto para que recompile automágicamente cuando cambies un archivo
    command: sh -c "npm ci && npm run start:dev"

  # Frontend: Angular
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: psicoeducandonos_frontend
    restart: unless-stopped
    ports:
      - '4200:4200'
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    # Sincroniza dependencias del contenedor con package-lock para evitar drift en node_modules.
    command: sh -c "npm ci && npm start -- --host 0.0.0.0 --poll 2000"

volumes:
  pgdata:
  frontend_node_modules:
