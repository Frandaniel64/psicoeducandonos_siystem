<!-- TopNavBar -->
<header class="w-full sticky top-0 z-50 bg-surface/80 dark:bg-slate-900/80 backdrop-blur-md">
<div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
<div class="text-2xl font-serif italic text-sky-900 dark:text-sky-100">Psicoeducándonos</div>
<nav class="hidden md:flex items-center gap-8">
<a routerLink="/" routerLinkActive="border-sky-700 dark:border-sky-400" [routerLinkActiveOptions]="{exact: true}" class="text-sky-900 dark:text-sky-100 font-semibold border-b-2 border-transparent pb-1 hover:text-sky-700 transition-colors duration-300">Inicio</a>
<a routerLink="/servicios" routerLinkActive="text-sky-900 border-sky-700 border-b-2" class="text-slate-600 dark:text-slate-400 font-medium border-b-2 border-transparent hover:text-sky-700 transition-colors duration-300 pb-1">Servicios</a>
<a routerLink="/blog" routerLinkActive="text-sky-900 border-sky-700 border-b-2" class="text-slate-600 dark:text-slate-400 font-medium border-b-2 border-transparent hover:text-sky-700 transition-colors duration-300 pb-1">Blog</a>
<a routerLink="/nosotros" routerLinkActive="text-sky-900 border-sky-700 border-b-2" class="text-slate-600 dark:text-slate-400 font-medium border-b-2 border-transparent hover:text-sky-700 transition-colors duration-300 pb-1">Nosotros</a>
</nav>
<div class="flex items-center gap-4">
<a routerLink="/login" class="text-slate-600 font-medium hover:text-sky-700 transition-colors duration-300 cursor-pointer">Iniciar Sesión</a>
<a routerLink="/registro" class="bg-primary text-on-primary px-6 py-2 rounded-full font-medium hover:scale-95 transition-transform duration-200 shadow-sm cursor-pointer">Registro</a>
</div>
</div>
</header>
