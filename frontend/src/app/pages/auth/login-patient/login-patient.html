<div class="min-h-[85vh] flex items-center justify-center bg-surface py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-4xl w-full flex flex-col md:flex-row bg-surface-container-lowest rounded-3xl shadow-soft-lg border border-outline-variant/20 overflow-hidden">
    <div class="hidden md:block md:w-1/2 relative bg-primary/5">
      <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=800" alt="" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-50" />
      <div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
      <div class="absolute bottom-0 left-0 p-10 text-on-primary">
        <h2 class="font-headline text-3xl mb-4">Bienvenido a tu Refugio</h2>
        <p class="text-sm opacity-90 leading-relaxed font-medium">Entendemos que el camino hacia la sanación tiene altibajos. Estás exactamente donde necesitas estar hoy.</p>
      </div>
    </div>

    <div class="w-full md:w-1/2 p-10 lg:p-14 flex flex-col justify-center">
      <div class="text-center mb-10">
        <span class="material-symbols-outlined text-4xl text-primary mb-2">vpn_key</span>
        <h2 class="font-headline text-3xl font-bold text-on-surface">Ingresa a tu Portal</h2>
        <p class="mt-2 text-sm text-on-surface-variant font-medium">
          ¿Aún no tienes cuenta?
          <a routerLink="/auth/registro" class="font-bold text-primary hover:text-primary-container transition-colors">Comienza aquí.</a>
        </p>
      </div>

      @if (error(); as msg) {
        <div class="mb-6 rounded-xl bg-error-container text-on-error-container px-4 py-3 text-sm" role="alert">{{ msg }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-on-surface">Correo Electrónico</label>
          <div class="mt-2">
            <input
              id="email"
              formControlName="email"
              type="email"
              autocomplete="email"
              class="block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest"
              placeholder="ejemplo@correo.com"
            />
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between">
            <label for="password" class="block text-sm font-medium text-on-surface">Contraseña</label>
            <div class="text-sm">
              <span class="font-semibold text-on-surface-variant">¿Olvidaste tu contraseña?</span>
            </div>
          </div>
          <div class="mt-2">
            <input
              id="password"
              formControlName="password"
              type="password"
              autocomplete="current-password"
              class="block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest"
              placeholder="••••••••"
            />
          </div>
        </div>

        <div>
          <button
            type="submit"
            [disabled]="loading()"
            class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-full shadow-soft text-sm font-bold text-on-primary custom-gradient hover:scale-[1.02] transition-transform focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-60 disabled:hover:scale-100"
          >
            {{ loading() ? 'Ingresando…' : 'Ingresar' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
