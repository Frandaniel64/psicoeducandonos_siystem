<div class="min-h-[85vh] flex items-center justify-center bg-surface py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-4xl w-full flex flex-col md:flex-row-reverse bg-surface-container-lowest rounded-3xl shadow-soft-lg border border-outline-variant/20 overflow-hidden">
    <div class="hidden md:block md:w-1/2 relative bg-primary-container/20">
      <img src="https://images.unsplash.com/photo-1490730141103-6cac27aaab94?auto=format&fit=crop&q=80&w=800" alt="" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-60" />
      <div class="absolute inset-0 bg-gradient-to-t from-sky-900/90 to-transparent"></div>
      <div class="absolute bottom-0 left-0 p-10 text-white">
        <h2 class="font-headline text-3xl mb-4">El primer paso es el más valiente</h2>
        <p class="text-sm opacity-90 leading-relaxed font-medium">Al crear tu cuenta estás optando por poner tu salud mental primero.</p>
      </div>
    </div>

    <div class="w-full md:w-1/2 p-10 lg:p-14 flex flex-col justify-center">
      <div class="text-center mb-10">
        <span class="material-symbols-outlined text-4xl text-primary mb-2">person_add</span>
        <h2 class="font-headline text-3xl font-bold text-on-surface">Crea tu Cuenta</h2>
        <p class="mt-2 text-sm text-on-surface-variant font-medium">
          ¿Ya tienes una cuenta?
          <a routerLink="/auth/login" class="font-bold text-primary hover:text-primary-container transition-colors">Inicia sesión aquí.</a>
        </p>
      </div>

      @if (error(); as msg) {
        <div class="mb-6 rounded-xl bg-error-container text-on-error-container px-4 py-3 text-sm" role="alert">{{ msg }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="firstName" class="block text-sm font-medium text-on-surface">Nombre</label>
            <input
              id="firstName"
              formControlName="firstName"
              type="text"
              autocomplete="given-name"
              class="mt-1.5 block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest"
            />
          </div>
          <div>
            <label for="lastName" class="block text-sm font-medium text-on-surface">Apellido</label>
            <input
              id="lastName"
              formControlName="lastName"
              type="text"
              autocomplete="family-name"
              class="mt-1.5 block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest"
            />
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-on-surface">Correo Electrónico</label>
          <input
            id="email"
            formControlName="email"
            type="email"
            autocomplete="email"
            class="mt-1.5 block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest"
            placeholder="ejemplo@correo.com"
          />
        </div>

        <div>
          <label for="phone" class="block text-sm font-medium text-on-surface">Teléfono (opcional)</label>
          <input
            id="phone"
            formControlName="phone"
            type="tel"
            autocomplete="tel"
            class="mt-1.5 block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-on-surface">Contraseña</label>
          <input
            id="password"
            formControlName="password"
            type="password"
            autocomplete="new-password"
            class="mt-1.5 block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest"
            placeholder="Mínimo 6 caracteres"
          />
        </div>

        <div class="flex items-start mt-4">
          <div class="flex h-6 items-center">
            <input id="terms" formControlName="terms" type="checkbox" class="h-4 w-4 rounded border-outline-variant/50 text-primary focus:ring-primary" />
          </div>
          <div class="ml-3 text-sm leading-6">
            <label for="terms" class="font-medium text-on-surface-variant"
              >Acepto las políticas de privacidad y el uso responsable del sitio.</label
            >
          </div>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            [disabled]="loading()"
            class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-full shadow-soft text-sm font-bold text-on-primary bg-primary hover:bg-sky-800 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-60"
          >
            {{ loading() ? 'Creando cuenta…' : 'Comenzar mi proceso' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
