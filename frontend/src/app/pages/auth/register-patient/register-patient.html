<div class="min-h-[85vh] flex items-center justify-center bg-surface py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-4xl w-full flex flex-col md:flex-row-reverse bg-surface-container-lowest rounded-3xl shadow-lg border border-outline-variant/20 overflow-hidden">
    
    <!-- Image / Comfort Side -->
    <div class="hidden md:block md:w-1/2 relative bg-primary-container/20">
      <img src="https://images.unsplash.com/photo-1490730141103-6cac27aaab94?auto=format&fit=crop&q=80&w=800" alt="Sanación" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-60" />
      <div class="absolute inset-0 bg-gradient-to-t from-sky-900/90 to-transparent"></div>
      <div class="absolute bottom-0 left-0 p-10 text-white">
        <h2 class="font-headline text-3xl mb-4">El primer paso es el más valiente</h2>
        <p class="text-sm opacity-90 leading-relaxed font-medium">Al crear tu cuenta estás optando por poner tu salud mental primero. Aquí encontrarás herramientas, acompañamiento y un lugar seguro, libre de juicios.</p>
      </div>
    </div>

    <!-- Registration Form Side -->
    <div class="w-full md:w-1/2 p-10 lg:p-14 flex flex-col justify-center">
      <div class="text-center mb-10">
        <span class="material-symbols-outlined text-4xl text-primary mb-2">person_add</span>
        <h2 class="font-headline text-3xl font-bold text-on-surface">Crea tu Cuenta</h2>
        <p class="mt-2 text-sm text-on-surface-variant font-medium">
          ¿Ya tienes una cuenta? 
          <a routerLink="/login" class="font-bold text-primary hover:text-sky-700 transition-colors">Inicia sesión aquí.</a>
        </p>
      </div>

      <form class="space-y-5">
        <div>
          <label for="name" class="block text-sm font-medium text-on-surface">Nombre Completo</label>
          <div class="mt-1.5">
            <input id="name" name="name" type="text" autocomplete="name" required class="block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest" placeholder="María Pérez">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-on-surface">Correo Electrónico</label>
          <div class="mt-1.5">
            <input id="email" name="email" type="email" autocomplete="email" required class="block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest" placeholder="ejemplo@correo.com">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-on-surface">Contraseña Segura</label>
          <div class="mt-1.5">
            <input id="password" name="password" type="password" autocomplete="new-password" required class="block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest" placeholder="Mínimo 8 caracteres">
          </div>
        </div>

        <div class="flex items-start mt-4">
          <div class="flex h-6 items-center">
            <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 rounded border-outline-variant/50 text-primary focus:ring-primary">
          </div>
          <div class="ml-3 text-sm leading-6">
            <label for="terms" class="font-medium text-on-surface-variant">Acepto las <a href="#" class="text-primary hover:underline">políticas de privacidad</a> y el compromiso de respeto del sitio.</label>
          </div>
        </div>

        <div class="pt-2">
          <button type="button" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-full shadow-sm text-sm font-bold text-on-primary bg-primary hover:bg-sky-800 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
            Comenzar mi Proceso
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
