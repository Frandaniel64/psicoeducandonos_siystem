<div class="min-h-[85vh] flex items-center justify-center bg-surface py-12 px-4 sm:px-6 lg:px-8 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] relative">
  
  <div class="absolute inset-0 bg-gradient-to-br from-surface to-surface-container-high opacity-90"></div>

  <div class="max-w-md w-full relative z-10 bg-surface-container-lowest rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-outline-variant/30 p-10 lg:p-14">
    
    <div class="text-center mb-10">
      <div class="mx-auto bg-primary/10 w-16 h-16 rounded-full flex items-center justify-center mb-6">
        <span class="material-symbols-outlined text-3xl text-primary">admin_panel_settings</span>
      </div>
      <h2 class="font-headline text-3xl font-bold text-on-surface">Portal de Terapeutas</h2>
      <p class="mt-2 text-sm text-on-surface-variant font-medium">
        Acceso exclusivo para el staff clínico de Psicoeducándonos.
      </p>
    </div>

    <form class="space-y-6">
      <div>
        <label for="staff-email" class="block text-sm font-medium text-on-surface">Correo Institucional</label>
        <div class="mt-2">
          <input id="staff-email" name="email" type="email" autocomplete="email" required class="block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest" placeholder="dr.nombre@psicoeducandonos.org">
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="staff-password" class="block text-sm font-medium text-on-surface">Contraseña</label>
        </div>
        <div class="mt-2">
          <input id="staff-password" name="password" type="password" autocomplete="current-password" required class="block w-full rounded-xl border-0 py-3 px-4 text-on-surface shadow-sm ring-1 ring-inset ring-outline-variant/30 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm bg-surface-container-lowest" placeholder="••••••••">
        </div>
      </div>

      <div class="pt-2">
        <button type="button" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-full shadow-sm text-sm font-bold text-on-primary bg-slate-900 hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900">
          Iniciar Sesión Privada
        </button>
      </div>

      <!-- Return option -->
      <div class="mt-8 text-center border-t border-outline-variant/20 pt-6">
        <p class="text-xs text-on-surface-variant">
          ¿Eres un paciente? <a routerLink="/login" class="font-bold text-primary hover:underline">Ir al Portal Público</a>
        </p>
      </div>
    </form>
  </div>
</div>
